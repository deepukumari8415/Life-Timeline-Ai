<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Timeline AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>🌟 Life Timeline AI 🌟</h1>
        <p class="subtitle">Let your AI Assistant build your future</p>
        
        <div class="field-wrapper">
            <input type="date" id="dob" required>
        </div>
        <div class="field-wrapper">
            <input type="text" id="milestone" placeholder="Enter Your Goal - 10th Pass, Job, Startup" required>
        </div>
        
        <button id="generateBtn">Generate Timeline ✨</button>
        
        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
