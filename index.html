<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Timeline AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>✨ Life Timeline AI ✨</h1>
    <p>Apni life ke moments daalo, AI tumhara future timeline bana dega</p>
    
    <input type="date" id="dob" placeholder="Birth Date">
    <input type="text" id="milestone" placeholder="Ex: 10th Pass - 2026">
    <button onclick="generateTimeline()">Generate Timeline</button>
    
    <div id="timeline"></div>

    <div class="coming-soon">
      <h3>🚀 Coming Soon</h3>
      <p>"Ask AI Anything" - Koi bhi sawal pucho, AI jawab dega</p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
