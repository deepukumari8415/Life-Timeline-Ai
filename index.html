<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Life Timeline AI</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- ANIME INTRO -->
<div class="intro-screen">
  <img src="boy.png" class="intro-boy" alt="boy">
  <h2 class="intro-text">Let me build your Future... ✨</h2>
</div>

<!-- MAIN FORM -->
<div class="container">
  <h1>Life Timeline AI 🌟</h1>
  
  <label>Enter Your DOB:</label>
  <input type="date" id="dob">

  <label>Select Your Course:</label>
  <select id="course">
    <option value="">--Choose--</option>
    <option value="10th">10th</option>
    <option value="11th">11th</option>
    <option value="12th">12th</option>
    <option value="btech">B.Tech - 4 Years</option>
    <option value="ba">BA - 3 Years</option>
    <option value="bsc">BSc - 3 Years</option>
    <option value="diploma"> -3 Years</option>
  </select>

  <div id="streamBox" class="hidden">
    <label>Choose Your Stream:</label>
    <select id="stream">
      <option value="arts">Arts</option>
      <option value="science">Science</option>
      <option value="commerce">Commerce</option>
    </select>
  </div>

  <div id="extraBox" class="hidden">
    <label>Which year are you in now? Ex: 1, 2, 3,4,5,6,</label>
    <input type="number" id="currentYear" placeholder="1, 2, 3, 4,5,6">
  </div>

  <button onclick="generateTimeline()">Predict My Future</button>
  <div id="resultBox"></div>
</div>

<script src="script.js"></script>
</body>
</html>
